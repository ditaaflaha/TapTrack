; =============================================================================
; PlatformIO Configuration - Akses Pintu Dual ESP32
; =============================================================================
; Cara Build & Upload:
;   Upload ESP Masuk : pio run -e masuk -t upload
;   Upload ESP Keluar: pio run -e keluar -t upload
;   Monitor Serial   : pio device monitor -e masuk  (atau -e keluar)
; =============================================================================

[common]
platform    = espressif32
board       = esp32dev
framework   = arduino
monitor_speed = 115200
lib_deps    =
    miguelbalboa/MFRC522@^1.4.11
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3

; --- Environment untuk ESP32 PINTU MASUK ---
[env:masuk]
extends = common
build_src_filter = +<main_masuk.cpp>

; --- Environment untuk ESP32 PINTU KELUAR ---
[env:keluar]
extends = common
build_src_filter = +<main_keluar.cpp>
